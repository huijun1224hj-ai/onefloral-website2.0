<!doctype html><html lang="zh-Hans"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>One Floral 后台</title><link rel="stylesheet" href="style.css"><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script></head><body class="adminBody"><main class="adminBox"><h1>One Floral 后台上传</h1><p>手机也可以上传新作品。填资料后按 Save，网站会自动更新。</p><label>照片 Photo</label><input id="photo" type="file" accept="image/*"><label>中文名称</label><input id="titleCN" placeholder="例如：毕业花束"><label>英文名称</label><input id="titleEN" placeholder="Graduation Bouquet"><label>分类 Category</label><select id="category"><option>定制花束</option><option>手捧花 / 胸针</option><option>定制桌花</option><option>开业花</option><option>批发花束</option><option>香皂花花盒</option></select><label>价格 Price</label><input id="price" placeholder="例如：RM88 起"><label>说明 Description</label><textarea id="description" placeholder="适合毕业、生日、送礼..."></textarea><button id="saveBtn" class="btn">Save 上传作品</button><p id="status"></p><hr><h2>现有作品</h2><div id="adminList" class="adminList"></div></main><script src="config.js"></script><script src="admin.js"></script></body></html>
